<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Psychological Research and Development</title>
  <style>
    :root {
      --bg: #050505;
      --panel: rgba(255, 255, 255, 0.04);
      --gold: #c9a54c;
      --gold-soft: rgba(201, 165, 76, 0.2);
      --silver: #c9c9c9;
      --silver-soft: rgba(201, 201, 201, 0.28);
      --text: #f3f0e7;
      --shadow: rgba(0, 0, 0, 0.55);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(201, 165, 76, 0.08), transparent 32%),
        linear-gradient(180deg, #0b0b0b 0%, var(--bg) 55%, #020202 100%);
      color: var(--text);
      font-family: "Times New Roman", Georgia, serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .frame {
      width: min(100%, 1000px);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(24px, 5vw, 56px);
      position: relative;
      isolation: isolate;
    }

    .frame::before {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      box-shadow:
        0 0 0 1px rgba(201, 165, 76, 0.06),
        0 24px 80px var(--shadow),
        inset 0 0 60px rgba(255, 255, 255, 0.015);
      pointer-events: none;
    }

    .hero {
      width: min(100%, 760px);
      padding: clamp(16px, 2vw, 24px);
      position: relative;
      z-index: 1;
    }

    .hero-inner {
      width: min(100%, 640px);
      margin: 0 auto;
      display: grid;
      justify-items: center;
      text-align: center;
      container-type: inline-size;
    }

    .eyebrow {
      margin: 0 0 1rem;
      font-size: clamp(0.78rem, 1.2vw, 0.96rem);
      text-transform: uppercase;
      color: var(--silver);
      opacity: 0.9;
    }

    .eyebrow span {
      display: inline-block;
      letter-spacing: 0.55em;
      padding-left: 0.55em;
      margin-right: -0.55em;
    }

    .headline-main {
      font-size: clamp(2rem, 10cqw, 4.2rem);
      line-height: 0.94;
      font-weight: 400;
      text-shadow: 0 14px 30px rgba(0, 0, 0, 0.4);
    }

    .headline-sub {
      font-size: clamp(0.82rem, 2.6cqw, 1.18rem);
      line-height: 1;
      color: var(--silver);
    }

    .headline-main span,
    .headline-sub span {
      display: inline-block;
    }

    .headline-main span {
      letter-spacing: 0.05em;
      padding-left: 0.05em;
      margin-right: -0.05em;
    }

    .headline-sub span {
      letter-spacing: 0.34em;
      padding-left: 0.34em;
      margin-right: -0.34em;
    }

    .divider {
      width: min(100%, 490px);
      height: 14px;
      margin: clamp(22px, 4vw, 36px) auto;
      position: relative;
    }

    .divider::before,
    .divider::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--silver) 14%, var(--gold) 50%, var(--silver) 86%, transparent 100%);
    }

    .divider::before {
      top: 2px;
    }

    .divider::after {
      bottom: 2px;
    }

    .statement {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(14px, 3vw, 28px);
      margin: 0 auto;
      width: fit-content;
      max-width: 100%;
      color: var(--text);
    }

    .triangle {
      width: clamp(28px, 5vw, 42px);
      height: clamp(24px, 4vw, 36px);
      flex: 0 0 auto;
      clip-path: polygon(50% 0, 100% 100%, 0 100%);
    }

    .triangle.outline {
      position: relative;
      clip-path: none;
      background: transparent;
    }

    .triangle.outline::before,
    .triangle.outline::after {
      content: "";
      position: absolute;
      inset: 0;
      clip-path: polygon(50% 0, 100% 100%, 0 100%);
    }

    .triangle.outline::before {
      background: rgba(201, 201, 201, 0.48);
    }

    .triangle.outline::after {
      inset: 2px;
      background: var(--bg);
    }

    .triangle.filled {
      background: linear-gradient(180deg, rgba(201, 201, 201, 0.95), rgba(201, 201, 201, 0.28));
      opacity: 0.82;
    }

    .statement-text {
      margin: 0;
      font-size: clamp(1.15rem, 3.1vw, 2.35rem);
      line-height: 1.12;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .statement-copy {
      display: inline-block;
      letter-spacing: 0.08em;
      padding-left: 0.08em;
      margin-right: -0.08em;
    }

    .statement-text .accent {
      color: var(--gold);
    }

    .service {
      margin: clamp(24px, 4vw, 34px) 0 0;
      font-size: clamp(0.95rem, 1.7vw, 1.18rem);
      text-transform: uppercase;
      color: var(--silver);
    }

    .service span {
      display: inline-block;
      letter-spacing: 0.42em;
      padding-left: 0.42em;
      margin-right: -0.42em;
    }

    .invitation {
      margin: 0.9rem 0 0;
      font-size: clamp(0.84rem, 1.4vw, 1rem);
      text-transform: uppercase;
      color: rgba(243, 240, 231, 0.74);
    }

    .invitation span {
      display: inline-block;
      letter-spacing: 0.36em;
      padding-left: 0.36em;
      margin-right: -0.36em;
    }

    .description {
      width: min(100%, 620px);
      margin: clamp(26px, 4vw, 40px) auto 0;
      font-size: clamp(0.96rem, 1.7vw, 1.08rem);
      line-height: 1.8;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(201, 201, 201, 0.9);
    }

    .description strong {
      color: var(--gold);
      font-weight: 400;
    }

    @media (max-width: 640px) {
      body {
        overflow: hidden;
      }

      .frame {
        width: 100%;
        min-height: 100dvh;
        padding: 14px 16px;
      }

      .frame::before {
        inset: 8px;
        border-radius: 20px;
      }

      .hero {
        width: 100%;
        padding: 4px 0;
      }

      .hero-inner {
        width: min(100%, 304px);
      }

      .eyebrow {
        margin-bottom: 0.7rem;
      }

      .eyebrow span {
        letter-spacing: 0.18em;
        padding-left: 0.18em;
        margin-right: -0.18em;
      }

      .crest {
        width: clamp(72px, 22vw, 92px);
        margin-bottom: 14px;
      }

      .title-lockup {
        gap: 8px;
      }

      .headline-main {
        font-size: clamp(1.95rem, 11.5cqw, 2.7rem);
      }

      .headline-sub {
        font-size: clamp(0.72rem, 4.4cqw, 0.92rem);
      }

      .description {
        font-size: 0.84rem;
        letter-spacing: 0.24em;
      }

      .headline-main span,
      .statement-copy {
        letter-spacing: 0.08em;
        padding-left: 0.08em;
        margin-right: -0.08em;
      }

      .headline-sub span {
        letter-spacing: 0.22em;
        padding-left: 0.22em;
        margin-right: -0.22em;
      }

      .statement {
        width: 100%;
        gap: 8px;
      }

      .triangle {
        width: 24px;
        height: 20px;
      }

      .statement-text {
        font-size: clamp(1rem, 5.6cqw, 1.35rem);
        white-space: normal;
      }

      .divider {
        width: min(100%, 240px);
        margin: 16px auto;
      }

      .service {
        margin-top: 18px;
        font-size: clamp(0.8rem, 4.2cqw, 0.95rem);
      }

      .service span {
        letter-spacing: 0.18em;
        padding-left: 0.18em;
        margin-right: -0.18em;
      }

      .invitation {
        margin-top: 0.75rem;
        font-size: clamp(0.68rem, 3.2cqw, 0.82rem);
      }

      .invitation span {
        letter-spacing: 0.14em;
        padding-left: 0.14em;
        margin-right: -0.14em;
      }
    }

    @media (max-height: 780px) {
      .crest {
        margin-bottom: 14px;
      }

      .divider {
        margin: 20px auto;
      }

      .description {
        margin-top: 22px;
        line-height: 1.55;
      }
    }
  </style>
</head>
<body>
  <main class="frame">
    <section class="hero" aria-label="Splash page content">
      <div class="hero-inner">
        <p class="eyebrow"><span>By Invitation Only</span></p>
        <div class="crest" aria-hidden="true"></div>

        <div class="title-lockup">
          <h1 class="headline-main"><span>Psychological</span></h1>
          <p class="headline-sub"><span>Research and Development</span></p>
        </div>

        <div class="divider" aria-hidden="true"></div>

        <div class="statement" aria-label="Unlock potential">
          <span class="triangle outline" aria-hidden="true"></span>
          <p class="statement-text"><span class="statement-copy">Unlock. <span class="accent">Potential.</span></span></p>
          <span class="triangle filled" aria-hidden="true"></span>
        </div>


      </div>
    </section>
  </main>
</body>
</html>
